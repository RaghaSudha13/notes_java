## Spring DATASOURCE (DataSourceAutoConfiguration & DataSourceProperties)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notes_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:notes_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:notes_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

## Hibernate Properties
# Dialect is auto-detected by Hibernate 6.7+ from the JDBC URL
spring.jpa.hibernate.ddl-auto=update

## Server port
server.port=8080

## Handle forwarded headers from reverse proxy
server.forward-headers-strategy=native

## SpringDoc OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
